<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Canvas — One-time Migration</title>
<style>
body{font-family:-apple-system,sans-serif;max-width:680px;margin:40px auto;padding:0 20px;color:#111;line-height:1.6}
h1{font-size:20px}
button{padding:12px 24px;border-radius:8px;background:#111;color:#fff;border:none;font-size:15px;font-weight:500;cursor:pointer;margin:12px 0}
button:disabled{opacity:.4}
#log{background:#f6f6f6;border:1px solid #ddd;border-radius:8px;padding:14px;font-family:monospace;font-size:12px;white-space:pre-wrap;max-height:400px;overflow-y:auto;margin-top:16px}
.warn{background:#fef3e2;border:1px solid #f5c87a;border-radius:8px;padding:12px;font-size:13px}
</style>
</head>
<body>
<h1>Canvas Restock — One-time History Migration</h1>
<div class="warn">This moves old order history from <code>/orders</code> + <code>/meta/counter</code> into <code>/units/canvas/orders</code> + <code>/units/canvas/counter</code>, mapping each item to its GL code / price using the current item catalog. Safe to run once. Re-running will create duplicate entries.</div>
<button id="run" onclick="runMigration()">Run Migration</button>
<div id="log"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getDatabase, ref, get, set, push } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

const FB = {
  apiKey:"AIzaSyBlhkq7t3KlDYwZcXUclF_0AqWYYdnlou8",
  authDomain:"compass-bar-448c0.firebaseapp.com",
  databaseURL:"https://compass-bar-448c0-default-rtdb.firebaseio.com",
  projectId:"compass-bar-448c0",
  storageBucket:"compass-bar-448c0.firebasestorage.app",
  messagingSenderId:"281477138732",
  appId:"1:281477138732:web:c2c0fffd5bd060f47ec489"
};
const app = initializeApp(FB);
const db = getDatabase(app);
const logEl = document.getElementById('log');
function log(msg){ logEl.textContent += msg + '\n'; logEl.scrollTop = logEl.scrollHeight; }

window.runMigration = async function(){
  document.getElementById('run').disabled = true;
  log('Starting migration...');

  // Load current canvas item catalog (for GL/price lookup)
  const itemsSnap = await get(ref(db,'units/canvas/items'));
  const catalog = itemsSnap.val() || {};
  log(`Loaded ${Object.keys(catalog).length} items from catalog.`);

  // Load old orders
  const oldOrdersSnap = await get(ref(db,'orders'));
  const oldOrders = oldOrdersSnap.val() || {};
  const oldKeys = Object.keys(oldOrders);
  log(`Found ${oldKeys.length} old orders.`);

  if(!oldKeys.length){ log('Nothing to migrate.'); return; }

  let migrated = 0;
  for(const key of oldKeys){
    const o = oldOrders[key];
    const newItems = {};
    Object.entries(o.items||{}).forEach(([iid, it])=>{
      const cat = catalog[iid] || {};
      newItems[iid] = {
        name: it.name,
        qty: it.qty,
        qtyType: 'unit',
        unitLabel: cat.unitLabel || 'each',
        unitPrice: cat.unitPrice || 0,
        boxLabel: cat.boxLabel || 'case',
        boxPrice: cat.boxPrice || 0,
        glCode: cat.gl || '',
        glCat: cat.glCat || '',
        s: it.s || 'pending'
      };
    });
    const newOrder = {
      num: o.num,
      createdAt: o.createdAt,
      createdBy: o.createdBy,
      date: o.date,
      status: o.status,
      completedAt: o.completedAt || null,
      items: newItems,
      migratedFrom: key
    };
    await set(push(ref(db,'units/canvas/orders')), newOrder);
    migrated++;
    log(`Migrated order #${o.num} (${o.createdBy}, ${o.date}) — ${Object.keys(newItems).length} items`);
  }

  // Migrate counter
  const oldCounterSnap = await get(ref(db,'meta/counter'));
  const oldCounter = oldCounterSnap.val();
  if(oldCounter){
    const newCounterSnap = await get(ref(db,'units/canvas/counter'));
    const newCounter = newCounterSnap.val();
    // Only overwrite if new counter doesn't exist or old has higher num for same/later date
    if(!newCounter || (oldCounter.date === newCounter.date && oldCounter.num > newCounter.num) || new Date(oldCounter.date) > new Date(newCounter.date)){
      await set(ref(db,'units/canvas/counter'), oldCounter);
      log(`Counter migrated: date=${oldCounter.date}, num=${oldCounter.num}`);
    } else {
      log(`Counter not overwritten (new counter is already ahead).`);
    }
  }

  log(`\nDone. Migrated ${migrated} orders.`);
  log(`\nYou can now check the History tab in the main app and canvas-admin.`);
};
</script>
</body>
</html>
