<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bar Restock">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)">
<title>Bar Restock · Compass</title>
<style>
:root{
  --ink:#111;--ink2:#555;--ink3:#999;
  --bg:#fff;--bg2:#f6f6f6;--bg3:#ededed;
  --bd:rgba(0,0,0,.10);--bd2:rgba(0,0,0,.18);
  --green-bg:#eaf3de;--green-txt:#2d5a0e;--green-bd:#b0d080;
  --red-bg:#fceaea;--red-txt:#a32d2d;--red-bd:#f0aaaa;
  --r:12px;--rs:8px;
}
@media(prefers-color-scheme:dark){
  :root{--ink:#f0f0f0;--ink2:#aaa;--ink3:#666;--bg:#141414;--bg2:#1e1e1e;--bg3:#2a2a2a;--bd:rgba(255,255,255,.1);--bd2:rgba(255,255,255,.2);}
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--ink)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px}
.hidden{display:none!important}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}

/* NAME SCREEN */
#name-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:20px}
.ns-logo{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3)}
.ns-title{font-size:24px;font-weight:600;color:var(--ink);text-align:center}
.ns-sub{font-size:14px;color:var(--ink2);text-align:center;line-height:1.6}
.ns-card{width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px}
.ns-card label{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink2)}
.ns-card input{width:100%;padding:14px 16px;border-radius:var(--rs);border:1.5px solid var(--bd2);background:var(--bg2);color:var(--ink);font-size:17px;outline:none}
.ns-card input:focus{border-color:var(--ink)}
.btn-go{width:100%;padding:15px;border-radius:var(--rs);background:var(--ink);color:var(--bg);font-size:15px;font-weight:500;border:none;margin-top:4px}
.btn-go:active{opacity:.8}

/* APP */
#app{display:flex;flex-direction:column;height:100vh}
.header{padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 10px;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--bg)}
.brand{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:2px}
.title-row{display:flex;align-items:center;justify-content:space-between}
.app-title{font-size:20px;font-weight:600;color:var(--ink)}
.name-tag{font-size:12px;color:var(--ink3);background:var(--bg2);border:1px solid var(--bd);border-radius:99px;padding:4px 10px;cursor:pointer}

.tabs{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--bg)}
.tab{flex:1;padding:11px 4px;text-align:center;font-size:13px;font-weight:500;color:var(--ink2);cursor:pointer;border-bottom:2px solid transparent;position:relative}
.tab.on{color:var(--ink);border-bottom-color:var(--ink)}
.tab-bub{position:absolute;top:7px;right:calc(50% - 26px);background:#e24b4a;color:#fff;border-radius:99px;font-size:9px;font-weight:600;padding:1px 5px;min-width:16px;text-align:center;display:none}

.views{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding-bottom:env(safe-area-inset-bottom,16px)}
.view.on{display:block}

/* BUILD */
.cart-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:10}
.cart-label{flex:1;font-size:13px;color:var(--ink2)}
.pub-btn{padding:10px 18px;border-radius:var(--rs);background:var(--ink);color:var(--bg);font-size:13px;font-weight:500;border:none;white-space:nowrap}
.pub-btn:active{opacity:.8}

.cat-hd{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:36px;font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3);background:var(--bg2);border-bottom:1px solid var(--bd);cursor:pointer;user-select:none;position:sticky;top:0;z-index:5}
.cat-hd:active{background:var(--bg3)}
.cat-chevron{font-size:10px;color:var(--ink3);transition:transform .2s}
.cat-chevron.open{transform:rotate(180deg)}
.cat-badge{font-size:10px;background:var(--ink);color:var(--bg);border-radius:99px;padding:1px 7px;font-weight:600;letter-spacing:0}

.item-row{display:flex;align-items:center;padding:0 16px;min-height:52px;border-bottom:1px solid var(--bd);gap:10px}
.item-row.in-cart{background:var(--bg2)}
.item-name{flex:1;font-size:14px;color:var(--ink)}
.add-btn{width:32px;height:32px;border-radius:50%;background:var(--ink);color:var(--bg);font-size:20px;font-weight:300;display:flex;align-items:center;justify-content:center;border:none;flex-shrink:0;line-height:1}
.add-btn:active{transform:scale(.82)}
.qty-row{display:flex;align-items:center;gap:4px}
.qb{width:32px;height:32px;border-radius:50%;background:var(--bg3);color:var(--ink);font-size:18px;display:flex;align-items:center;justify-content:center;border:1px solid var(--bd2);flex-shrink:0;line-height:1}
.qb:active{transform:scale(.82)}
.qn{font-size:15px;font-weight:500;min-width:26px;text-align:center;color:var(--ink)}

/* ACTIVE */
.order-card{margin:12px 16px;border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.oc-head{padding:12px 14px;background:var(--bg2);display:flex;align-items:center;justify-content:space-between}
.oc-title{font-size:14px;font-weight:500;color:var(--ink)}
.oc-by{font-size:11px;color:var(--ink3);margin-top:1px}
.oc-meta{font-size:12px;color:var(--ink2);text-align:right;line-height:1.5}
.oc-bar{height:4px;background:var(--bg3)}
.oc-fill{height:100%;background:var(--green-txt);transition:width .3s}

/* category sub-headers inside active order */
.oi-cat{padding:6px 14px 4px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);background:var(--bg2);border-top:1px solid var(--bd)}

.oi{display:flex;align-items:center;padding:0 14px;min-height:52px;border-top:1px solid var(--bd);gap:8px}
.oi.s-done .oi-nm,.oi.s-done .oi-qty{text-decoration:line-through;color:var(--ink3)}
.oi.s-out .oi-nm{text-decoration:line-through;color:var(--red-txt)}
.oi.s-out .oi-qty{color:var(--ink3)}
.oi-qty{font-size:12px;color:var(--ink3);min-width:24px}
.oi-nm{flex:1;font-size:13px;color:var(--ink)}
.act-btns{display:flex;gap:6px;flex-shrink:0}
.ab{padding:6px 10px;border-radius:var(--rs);font-size:12px;font-weight:500;border:1px solid;white-space:nowrap}
.ab:active{transform:scale(.9)}
.ab-done{background:var(--green-bg);color:var(--green-txt);border-color:var(--green-bd)}
.ab-out{background:var(--red-bg);color:var(--red-txt);border-color:var(--red-bd)}
.stamp-done{font-size:12px;font-weight:500;color:var(--green-txt)}
.stamp-out{font-size:12px;font-weight:500;color:var(--red-txt)}

/* HISTORY */
.hist-hd{padding:10px 16px 4px;font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3)}
.hcard{margin:6px 16px;border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.hc-head{padding:11px 14px;background:var(--bg2);display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.hc-head:active{background:var(--bg3)}
.hc-left{display:flex;flex-direction:column;gap:2px}
.hc-num{font-size:13px;font-weight:500;color:var(--ink)}
.hc-meta{font-size:11px;color:var(--ink3)}
.hc-right{display:flex;align-items:center;gap:8px}
.hc-chevron{font-size:11px;color:var(--ink3);transition:transform .2s}
.hc-chevron.open{transform:rotate(180deg)}
.hc-items{}
.hci{display:flex;justify-content:space-between;padding:8px 14px;border-top:1px solid var(--bd);font-size:13px;align-items:center}
.hci-nm{color:var(--ink)}
.hci-nm.out{color:var(--red-txt);text-decoration:line-through}
.hci-r{font-size:12px;color:var(--ink3)}
  let h = '';
  if (!done.length) {
    h += '<div class="empty" style="padding-top:16px"><strong>No completed orders today</strong>Completed orders appear here.</div>';
  } else {
    h += `<div class="hist-hd">Completed today — ${done.length} order${done.length>1?'s':''}</div>`;
    done.forEach(([key, o]) => {
      const items   = Object.entries(o.items||{});
      const outN    = items.filter(([,v]) => v.s==='out').length;
      const isOpen  = !collapsedOrders.has(key);

      h += `<div class="hcard">
        <div class="hc-head" onclick="toggleOrder('${key}')">
          <div class="hc-left">
            <div class="hc-num">Order #${o.num} · ${o.createdBy}</div>
            <div class="hc-meta">${fmt(o.createdAt)} → ${fmt(o.completedAt)}${outN ? ` · ${outN} out` : ''} · ${items.length} items</div>
          </div>
          <div class="hc-right">
            <span class="hc-chevron${isOpen?' open':''}">▼</span>
          </div>
        </div>`;

      if (isOpen) {
        h += `<div class="hc-items">`;
        items.forEach(([,it]) => {
          h += `<div class="hci">
            <span class="hci-nm${it.s==='out'?' out':''}">${it.name}</span>
            <span class="hci-r">×${it.qty} ${it.s==='done'?'✓':'✗'}</span>
          </div>`;
        });
        h += `</div>`;
      }

      h += `</div>`;
    });
  }

  el.innerHTML = h;
}

window.copyInvite = function() {
  const url = `${location.origin}${location.pathname}`;
  navigator.clipboard?.writeText(url)
    .then(() => alert('Link copied!\n\nSend it to teammates — they open it, enter their name, and see all orders live.'))
    .catch(() => prompt('Copy this invite link:', url));
};

boot();
</script>
</body>
</html>
